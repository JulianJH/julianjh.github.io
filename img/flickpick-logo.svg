<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#12201e"/>

  <!-- stacked card peeking behind (watchlist queue) -->
  <rect x="27" y="14" width="22" height="34" rx="5" fill="#1a2e2b" stroke="#3f5d55" stroke-width="1.5" transform="rotate(8 38 31)"/>

  <!-- front swiped card -->
  <rect x="16" y="12" width="24" height="36" rx="5" fill="#e08a1e" transform="rotate(-9 28 30)"/>

  <!-- letterboxd "watched" eye badge, centered on the front card -->
  <g transform="rotate(-9 28 30)">
    <path d="M20.9 30 Q28 22 35.1 30 Q28 38 20.9 30 Z" fill="#3f5d55"/>
    <circle cx="28" cy="30" r="2.6" fill="#e08a1e"/>
    <circle cx="28" cy="30" r="1.8" fill="#3f5d55"/>
  </g>

  <!-- letterboxd-style trio dots, along the bottom -->
  <circle cx="24" cy="56" r="2.2" fill="#ff8000"/>
  <circle cx="31.2" cy="56" r="2.2" fill="#00e054"/>
  <circle cx="38.4" cy="56" r="2.2" fill="#40bcf4"/>
</svg>
